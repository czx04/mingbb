name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy-api.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm --workspace apps/api run lint
      - run: npm --workspace apps/api run test
      - run: npm --workspace apps/api run build
      - run: curl --fail --request POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

